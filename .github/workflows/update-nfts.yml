name: Update NFT Data

on:
  # Run every Sunday at midnight UTC
  schedule:
    - cron: '0 0 * * 0'
  # Also run on every push to main (so fresh data appears after deploys)
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-nfts:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit nfts.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch NFT data from OpenSea
        run: node fetch-nfts.js
        env:
          OPENSEA_API_KEY: ${{ secrets.OPENSEA_API_KEY }}

      - name: Commit updated nfts.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nfts.json
          # Only commit if the file actually changed
          git diff --staged --quiet \
            || git commit -m "chore: refresh NFT data from OpenSea [skip ci]"
          git push
