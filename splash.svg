<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000000"/>
  <!-- CRT scanlines effect -->
  <rect width="1200" height="630" fill="url(#scanlines)" opacity="0.15"/>
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="2" fill="#00ff00" opacity="0.1"/>
    </pattern>
  </defs>
  <!-- Outer border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#00ff00" stroke-width="3"/>
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#ff0000" stroke-width="1"/>
  <!-- Warning badge top -->
  <rect x="500" y="20" width="200" height="36" fill="#ff0000"/>
  <text x="600" y="45" font-family="monospace,Courier New,Courier" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle" letter-spacing="2">⚠ CLASSIFIED ⚠</text>
  <!-- Main title -->
  <text x="600" y="220" font-family="monospace,Courier New,Courier" font-size="110" font-weight="bold" fill="#00ff00" text-anchor="middle" letter-spacing="6">GOODLUMS</text>
  <!-- Subtitle -->
  <text x="600" y="280" font-family="monospace,Courier New,Courier" font-size="28" fill="#ff0000" text-anchor="middle" letter-spacing="4">POST-APOCALYPTIC INTERNET GANG</text>
  <!-- Body text -->
  <text x="600" y="340" font-family="monospace,Courier New,Courier" font-size="20" fill="#00ff00" text-anchor="middle" letter-spacing="2">500 SUSPECTS · BASE CHAIN · NO NEW MEMBERS</text>
  <!-- Status line -->
  <text x="600" y="420" font-family="monospace,Courier New,Courier" font-size="16" fill="#ff0000" text-anchor="middle" letter-spacing="3">[ FARCASTER MINI-APP · DEPLOYED ]</text>
  <!-- Bottom warning -->
  <text x="600" y="570" font-family="monospace,Courier New,Courier" font-size="14" fill="#00ff00" text-anchor="middle" opacity="0.6">JOIN AT YOUR OWN RISK · thegoodlums</text>
</svg>
