<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#1a1000"/>
  <!-- Cigawrettts - cigarette pack style -->
  <!-- Pack body -->
  <rect x="40" y="25" width="120" height="155" rx="5" fill="#cc2200" stroke="#ff4400" stroke-width="2"/>
  <!-- Gold band -->
  <rect x="40" y="55" width="120" height="20" fill="#ffd700"/>
  <!-- White top section -->
  <rect x="40" y="25" width="120" height="30" rx="5" fill="#f5f5f5"/>
  <!-- Brand text area -->
  <rect x="48" y="82" width="104" height="80" fill="#990000" rx="3"/>
  <!-- Cigarette filter circles at top -->
  <circle cx="65" cy="40" r="8" fill="#d4a574"/>
  <circle cx="85" cy="40" r="8" fill="#d4a574"/>
  <circle cx="105" cy="40" r="8" fill="#d4a574"/>
  <circle cx="125" cy="40" r="8" fill="#d4a574"/>
  <circle cx="145" cy="40" r="8" fill="#d4a574"/>
  <!-- Brand name -->
  <text x="100" y="115" font-family="monospace" font-size="11" fill="#ffd700" text-anchor="middle" font-weight="bold" letter-spacing="1">CIGAWRETTTS</text>
  <text x="100" y="135" font-family="monospace" font-size="7" fill="#ffaa00" text-anchor="middle">ULTRA RARE</text>
  <!-- Warning text -->
  <rect x="40" y="165" width="120" height="15" fill="#000"/>
  <text x="100" y="176" font-family="monospace" font-size="6" fill="#ff0" text-anchor="middle">EXTREMELY BASED</text>
</svg>
