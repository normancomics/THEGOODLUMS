<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#0a0000"/>
  <!-- Remilia Corporation - corporate logo style -->
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#cc0000" stroke-width="3"/>
  <rect x="30" y="30" width="140" height="140" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.5"/>
  <!-- R letterform -->
  <path d="M55 60 L55 140 M55 60 L105 60 Q130 60 130 85 Q130 110 105 110 L55 110 M100 110 L130 140" 
    stroke="#cc0000" stroke-width="8" fill="none" stroke-linecap="square"/>
  <!-- Corp text -->
  <text x="100" y="168" font-family="monospace" font-size="10" fill="#cc0000" text-anchor="middle" letter-spacing="2">REMILIA CORP</text>
  <!-- Corner marks -->
  <line x1="20" y1="30" x2="30" y2="30" stroke="#cc0000" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="30" stroke="#cc0000" stroke-width="2"/>
  <line x1="170" y1="30" x2="180" y2="30" stroke="#cc0000" stroke-width="2"/>
  <line x1="180" y1="20" x2="180" y2="30" stroke="#cc0000" stroke-width="2"/>
  <line x1="20" y1="170" x2="30" y2="170" stroke="#cc0000" stroke-width="2"/>
  <line x1="20" y1="170" x2="20" y2="180" stroke="#cc0000" stroke-width="2"/>
  <line x1="170" y1="170" x2="180" y2="170" stroke="#cc0000" stroke-width="2"/>
  <line x1="180" y1="170" x2="180" y2="180" stroke="#cc0000" stroke-width="2"/>
</svg>
