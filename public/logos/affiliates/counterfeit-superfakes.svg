<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#0a000a"/>
  <!-- Counterfeit Superfakes - counterfeit money aesthetic -->
  <!-- Outer border with security pattern -->
  <rect x="10" y="30" width="180" height="140" rx="8" fill="#001a00" stroke="#00aa00" stroke-width="3"/>
  <rect x="15" y="35" width="170" height="130" rx="5" fill="none" stroke="#00aa00" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Dollar sign watermark -->
  <text x="100" y="120" font-family="serif" font-size="80" fill="#004400" text-anchor="middle" font-weight="bold">$</text>
  <!-- COUNTERFEIT stamp diagonal -->
  <g transform="rotate(-25, 100, 100)">
    <rect x="15" y="88" width="170" height="26" fill="none" stroke="#ff0000" stroke-width="2"/>
    <text x="100" y="106" font-family="monospace" font-size="13" fill="#ff0000" text-anchor="middle" font-weight="bold" letter-spacing="2">COUNTERFEIT</text>
  </g>
  <!-- SUPERFAKES text bottom -->
  <text x="100" y="175" font-family="monospace" font-size="9" fill="#00aa00" text-anchor="middle" letter-spacing="1">SUPERFAKES</text>
  <!-- Security thread -->
  <line x1="140" y1="30" x2="140" y2="170" stroke="#00ff00" stroke-width="1" opacity="0.3" stroke-dasharray="2,4"/>
  <!-- Serial numbers -->
  <text x="20" y="58" font-family="monospace" font-size="6" fill="#00aa00">GL00042069</text>
  <text x="180" y="58" font-family="monospace" font-size="6" fill="#00aa00" text-anchor="end">GL00042069</text>
</svg>
